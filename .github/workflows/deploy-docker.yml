name: Deploy Docker to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build and publish images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    outputs:
      image_owner: ${{ steps.images.outputs.image_owner }}
      website_image: ${{ steps.images.outputs.website_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build environment
        shell: bash
        env:
          SITE_PUBLIC_URL_VAR: ${{ vars.SITE_PUBLIC_URL_DOCKER }}
          SITE_PUBLIC_URL_SECRET: ${{ secrets.SITE_PUBLIC_URL_DOCKER }}
        run: |
          set -euo pipefail

          resolved_url=""
          if [[ -n "${SITE_PUBLIC_URL_VAR:-}" ]]; then
            resolved_url="${SITE_PUBLIC_URL_VAR}"
          elif [[ -n "${SITE_PUBLIC_URL_SECRET:-}" ]]; then
            resolved_url="${SITE_PUBLIC_URL_SECRET}"
          elif [[ -f CNAME ]]; then
            resolved_url="$(head -n 1 CNAME | tr -d '[:space:]')"
          else
            echo "::error title=Missing SITE_PUBLIC_URL_DOCKER::Set vars.SITE_PUBLIC_URL_DOCKER or secrets.SITE_PUBLIC_URL_DOCKER (or add CNAME)."
            exit 1
          fi

          echo "SITE_PUBLIC_URL=$resolved_url" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          echo "Resolved SITE_PUBLIC_URL=$resolved_url"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: images
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_owner=$owner" >> "$GITHUB_OUTPUT"
          echo "website_image=ghcr.io/$owner/website:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SITE_PUBLIC_URL=${{ env.SITE_PUBLIC_URL }}
            VITE_BASE_PATH=${{ env.VITE_BASE_PATH }}
          tags: |
            ${{ steps.images.outputs.website_image }}
            ghcr.io/${{ steps.images.outputs.image_owner }}/website:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Website frontend image

  deploy:
    name: Deploy to server
    needs:
      - build-and-publish
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      WEBSITE_IMAGE: ${{ needs.build-and-publish.outputs.website_image }}
      SITE_GDOC_RESUME_ID_VAR: ${{ vars.SITE_GDOC_RESUME_ID }}
      SITE_GDOC_RESUME_ID_SECRET: ${{ secrets.SITE_GDOC_RESUME_ID }}
      SITE_RESUME_OPEN_URL_VAR: ${{ vars.SITE_RESUME_OPEN_URL }}
      SITE_RESUME_EMBED_URL_VAR: ${{ vars.SITE_RESUME_EMBED_URL }}
      SITE_RESUME_DOWNLOAD_URL_VAR: ${{ vars.SITE_RESUME_DOWNLOAD_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in DEPLOY_USER DEPLOY_HOST DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing required deployment secrets::Set these secrets in repository secrets or Environment 'production': ${missing[*]}"
            exit 1
          fi

          if [[ -z "${DEPLOY_PORT:-}" ]]; then
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          fi

          if [[ -n "${GHCR_USERNAME:-}" && -z "${GHCR_TOKEN:-}" ]]; then
            echo "::error title=Missing GHCR_TOKEN::GHCR_USERNAME is set but GHCR_TOKEN is empty."
            exit 1
          fi

          if [[ -z "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
            echo "::error title=Missing GHCR_USERNAME::GHCR_TOKEN is set but GHCR_USERNAME is empty."
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest main and deploy on server
        shell: bash
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          read_env_value() {
            local key="$1"
            if [[ ! -f .env ]]; then
              return 0
            fi
            grep -E "^${key}=" .env | head -n 1 | cut -d '=' -f2- || true
          }

          resume_id="${SITE_GDOC_RESUME_ID_VAR:-}"
          if [[ -z "$resume_id" && -n "${SITE_GDOC_RESUME_ID_SECRET:-}" ]]; then
            resume_id="$SITE_GDOC_RESUME_ID_SECRET"
          fi
          if [[ -z "$resume_id" ]]; then
            resume_id="$(read_env_value SITE_GDOC_RESUME_ID)"
          fi

          resume_open_url="${SITE_RESUME_OPEN_URL_VAR:-}"
          if [[ -z "$resume_id" && -z "$resume_open_url" ]]; then
            resume_open_url="$(read_env_value SITE_RESUME_OPEN_URL)"
          fi

          resume_embed_url="${SITE_RESUME_EMBED_URL_VAR:-}"
          if [[ -z "$resume_id" && -z "$resume_embed_url" ]]; then
            resume_embed_url="$(read_env_value SITE_RESUME_EMBED_URL)"
          fi

          resume_download_url="${SITE_RESUME_DOWNLOAD_URL_VAR:-}"
          if [[ -z "$resume_id" && -z "$resume_download_url" ]]; then
            resume_download_url="$(read_env_value SITE_RESUME_DOWNLOAD_URL)"
          fi

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' WEBSITE_IMAGE='$WEBSITE_IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' SITE_GDOC_RESUME_ID='$resume_id' SITE_RESUME_OPEN_URL='$resume_open_url' SITE_RESUME_EMBED_URL='$resume_embed_url' SITE_RESUME_DOWNLOAD_URL='$resume_download_url' bash '$DEPLOY_PATH/scripts/deploy-remote.sh'"

      - name: Cleanup old GHCR versions (keep 3)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          keep=3
          packages=("website")

          detect_scope() {
            local pkg="$1"
            if gh api "users/$owner/packages/container/$pkg/versions?per_page=1" >/dev/null 2>&1; then
              printf '%s' "users"
              return 0
            fi

            if gh api "orgs/$owner/packages/container/$pkg/versions?per_page=1" >/dev/null 2>&1; then
              printf '%s' "orgs"
              return 0
            fi

            return 1
          }

          list_versions() {
            local scope="$1"
            local pkg="$2"
            gh api "$scope/$owner/packages/container/$pkg/versions?per_page=100"
          }

          delete_version() {
            local scope="$1"
            local pkg="$2"
            local id="$3"
            gh api -X DELETE "$scope/$owner/packages/container/$pkg/versions/$id" >/dev/null
          }

          for pkg in "${packages[@]}"; do
            echo "Cleaning package: $pkg"

            scope="$(detect_scope "$pkg" || true)"
            if [[ -z "$scope" ]]; then
              echo "Could not access package '$pkg' under users/$owner or orgs/$owner."
              echo "Fix package linkage/access first, or provide GHCR_CLEANUP_TOKEN with delete:packages scope."
              exit 1
            fi

            versions_json="$(list_versions "$scope" "$pkg")"

            if [[ -z "$versions_json" ]] || [[ "$versions_json" == "[]" ]]; then
              echo "No versions found for $pkg"
              continue
            fi

            mapfile -t stale_ids < <(printf '%s' "$versions_json" | jq -r --argjson keep "$keep" '
              sort_by(.created_at) | reverse | .[$keep:] | .[].id
            ')

            if (( ${#stale_ids[@]} == 0 )); then
              echo "Nothing to delete for $pkg"
              continue
            fi

            for id in "${stale_ids[@]}"; do
              echo "Deleting $pkg version id=$id"
              if ! delete_version "$scope" "$pkg" "$id" 2>/tmp/ghcr_cleanup_err.log; then
                err_msg="$(cat /tmp/ghcr_cleanup_err.log)"
                echo "Failed to delete $pkg version id=$id"
                echo "$err_msg"
                echo "Cleanup needs admin/delete permission on package '$pkg'."
                echo "Set package Actions access to Admin for this repo, or set GHCR_CLEANUP_TOKEN (classic PAT with delete:packages)."
                exit 1
              fi
            done
          done