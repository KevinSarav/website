name: Deploy to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-and-publish:
    name: Build and publish images
    runs-on: ubuntu-latest
    environment: production-selfhost
    permissions:
      contents: read
      packages: write
    outputs:
      image_owner: ${{ steps.images.outputs.image_owner }}
      website_image: ${{ steps.images.outputs.website_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build environment
        shell: bash
        env:
          SITE_PUBLIC_URL_VAR: ${{ vars.SITE_PUBLIC_URL }}
          SITE_PUBLIC_URL_SECRET: ${{ secrets.SITE_PUBLIC_URL }}
          PROFILE_CITY_VAR: ${{ vars.PROFILE_CITY }}
          PROFILE_REGION_VAR: ${{ vars.PROFILE_REGION }}
          PROFILE_COUNTRY_VAR: ${{ vars.PROFILE_COUNTRY }}
        run: |
          set -euo pipefail

          resolved_url=""
          if [[ -n "${SITE_PUBLIC_URL_VAR:-}" ]]; then
            resolved_url="${SITE_PUBLIC_URL_VAR}"
          elif [[ -n "${SITE_PUBLIC_URL_SECRET:-}" ]]; then
            resolved_url="${SITE_PUBLIC_URL_SECRET}"
          elif [[ -f CNAME ]]; then
            resolved_url="$(head -n 1 CNAME | tr -d '[:space:]')"
          else
            echo "::error title=Missing SITE_PUBLIC_URL::Set vars.SITE_PUBLIC_URL or secrets.SITE_PUBLIC_URL (or add CNAME)."
            exit 1
          fi

          echo "SITE_PUBLIC_URL=$resolved_url" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          echo "PROFILE_CITY=${PROFILE_CITY_VAR:-}" >> "$GITHUB_ENV"
          echo "PROFILE_REGION=${PROFILE_REGION_VAR:-}" >> "$GITHUB_ENV"
          echo "PROFILE_COUNTRY=${PROFILE_COUNTRY_VAR:-}" >> "$GITHUB_ENV"
          echo "Resolved SITE_PUBLIC_URL=$resolved_url"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: images
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_owner=$owner" >> "$GITHUB_OUTPUT"
          echo "website_image=ghcr.io/$owner/website:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SITE_PUBLIC_URL=${{ env.SITE_PUBLIC_URL }}
            VITE_BASE_PATH=${{ env.VITE_BASE_PATH }}
          tags: |
            ${{ steps.images.outputs.website_image }}
            ghcr.io/${{ steps.images.outputs.image_owner }}/website:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Website frontend image

  deploy:
    name: Deploy to server
    needs:
      - build-and-publish
    runs-on: ubuntu-latest
    environment: production-selfhost
    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      WEBSITE_IMAGE: ${{ needs.build-and-publish.outputs.website_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in DEPLOY_USER DEPLOY_HOST DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing required deployment secrets::Set these secrets in repository secrets or Environment 'production': ${missing[*]}"
            exit 1
          fi

          if [[ -z "${DEPLOY_PORT:-}" ]]; then
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          fi

          if [[ -n "${GHCR_USERNAME:-}" && -z "${GHCR_TOKEN:-}" ]]; then
            echo "::error title=Missing GHCR_TOKEN::GHCR_USERNAME is set but GHCR_TOKEN is empty."
            exit 1
          fi

          if [[ -z "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
            echo "::error title=Missing GHCR_USERNAME::GHCR_TOKEN is set but GHCR_USERNAME is empty."
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest main and deploy on server
        shell: bash
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' WEBSITE_IMAGE='$WEBSITE_IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' PROFILE_CITY='${PROFILE_CITY:-}' PROFILE_REGION='${PROFILE_REGION:-}' PROFILE_COUNTRY='${PROFILE_COUNTRY:-}' bash '$DEPLOY_PATH/scripts/deploy-selfhost.sh'"

      - name: Detect self-host geolocation
        id: detect_geo
        shell: bash
        run: |
          set -euo pipefail

          remote_ip="$(ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "(curl -fsSL --retry 2 --retry-delay 1 --retry-all-errors https://api.ipify.org || curl -fsSL --retry 2 --retry-delay 1 --retry-all-errors https://ifconfig.me) 2>/dev/null" || true)"

          remote_ip="$(printf '%s' "$remote_ip" | tr -d '[:space:]')"
          if [[ -z "$remote_ip" ]]; then
            echo "Could not resolve self-host public IP. Skipping geolocation sync."
            echo "city=" >> "$GITHUB_OUTPUT"
            echo "region=" >> "$GITHUB_OUTPUT"
            echo "country=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          city=""
          region=""
          country=""

          # Provider 1: ipapi.co
          geo_json="$(curl -fsSL --retry 2 --retry-delay 1 --retry-all-errors "https://ipapi.co/${remote_ip}/json/" 2>/dev/null || true)"
          if [[ -n "$geo_json" ]]; then
            city="$(printf '%s' "$geo_json" | jq -r '.city // empty' 2>/dev/null || true)"
            region="$(printf '%s' "$geo_json" | jq -r '.region // empty' 2>/dev/null || true)"
            country="$(printf '%s' "$geo_json" | jq -r '.country_name // empty' 2>/dev/null || true)"
          fi

          # Provider 2 fallback: ipwho.is
          if [[ -z "$city" || -z "$region" || -z "$country" ]]; then
            geo_json="$(curl -fsSL --retry 2 --retry-delay 1 --retry-all-errors "https://ipwho.is/${remote_ip}" 2>/dev/null || true)"
            if [[ -n "$geo_json" ]]; then
              city="$(printf '%s' "$geo_json" | jq -r '.city // empty' 2>/dev/null || true)"
              region="$(printf '%s' "$geo_json" | jq -r '.region // empty' 2>/dev/null || true)"
              country="$(printf '%s' "$geo_json" | jq -r '.country // empty' 2>/dev/null || true)"
            fi
          fi

          if [[ -z "$city" || -z "$region" || -z "$country" ]]; then
            echo "Geolocation providers did not return full data. Skipping geolocation sync."
          else
            echo "Detected self-host location: $city, $region, $country"
          fi

          echo "city=$city" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "country=$country" >> "$GITHUB_OUTPUT"

      - name: Compare profile location with geolocation
        id: compare_geo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CITY: ${{ steps.detect_geo.outputs.city }}
          NEW_REGION: ${{ steps.detect_geo.outputs.region }}
          NEW_COUNTRY: ${{ steps.detect_geo.outputs.country }}
        run: |
          set -euo pipefail

          if [[ -z "${NEW_CITY:-}" || -z "${NEW_REGION:-}" || -z "${NEW_COUNTRY:-}" ]]; then
            echo "Incomplete geolocation from self-host. Skipping profile location sync."
            echo "location_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          repo="$GITHUB_REPOSITORY"

          get_env_var_value() {
            local env_name="$1"
            local key="$2"
            gh api "repos/$repo/environments/$env_name/variables" \
              --jq ".variables[]? | select(.name == \"$key\") | .value" 2>/dev/null || true
          }

          current_city="$(get_env_var_value production-online PROFILE_CITY)"
          current_region="$(get_env_var_value production-online PROFILE_REGION)"
          current_country="$(get_env_var_value production-online PROFILE_COUNTRY)"

          if [[ "$NEW_CITY" == "$current_city" && "$NEW_REGION" == "$current_region" && "$NEW_COUNTRY" == "$current_country" ]]; then
            echo "Profile location unchanged."
            echo "location_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "location_changed=true" >> "$GITHUB_OUTPUT"

      - name: Sync profile location vars
        if: steps.compare_geo.outputs.location_changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CITY: ${{ steps.detect_geo.outputs.city }}
          NEW_REGION: ${{ steps.detect_geo.outputs.region }}
          NEW_COUNTRY: ${{ steps.detect_geo.outputs.country }}
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"

          for env_name in production-online production-selfhost; do
            gh variable set PROFILE_CITY --env "$env_name" --repo "$repo" --body "$NEW_CITY"
            gh variable set PROFILE_REGION --env "$env_name" --repo "$repo" --body "$NEW_REGION"
            gh variable set PROFILE_COUNTRY --env "$env_name" --repo "$repo" --body "$NEW_COUNTRY"
          done

          echo "Updated profile location to: $NEW_CITY, $NEW_REGION, $NEW_COUNTRY"

      - name: Trigger Pages redeploy
        if: steps.compare_geo.outputs.location_changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run deploy-remote.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
          echo "Triggered deploy-remote.yml due to location change."

      - name: Cleanup old GHCR versions (keep 3)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          keep=3
          packages=("website")

          detect_scope() {
            local pkg="$1"
            if gh api "users/$owner/packages/container/$pkg/versions?per_page=1" >/dev/null 2>&1; then
              printf '%s' "users"
              return 0
            fi

            if gh api "orgs/$owner/packages/container/$pkg/versions?per_page=1" >/dev/null 2>&1; then
              printf '%s' "orgs"
              return 0
            fi

            return 1
          }

          list_versions() {
            local scope="$1"
            local pkg="$2"
            gh api "$scope/$owner/packages/container/$pkg/versions?per_page=100"
          }

          delete_version() {
            local scope="$1"
            local pkg="$2"
            local id="$3"
            gh api -X DELETE "$scope/$owner/packages/container/$pkg/versions/$id" >/dev/null
          }

          for pkg in "${packages[@]}"; do
            echo "Cleaning package: $pkg"

            scope="$(detect_scope "$pkg" || true)"
            if [[ -z "$scope" ]]; then
              echo "Could not access package '$pkg' under users/$owner or orgs/$owner."
              echo "Fix package linkage/access first, or provide GHCR_CLEANUP_TOKEN with delete:packages scope."
              exit 1
            fi

            versions_json="$(list_versions "$scope" "$pkg")"

            if [[ -z "$versions_json" ]] || [[ "$versions_json" == "[]" ]]; then
              echo "No versions found for $pkg"
              continue
            fi

            mapfile -t stale_ids < <(printf '%s' "$versions_json" | jq -r --argjson keep "$keep" '
              sort_by(.created_at) | reverse | .[$keep:] | .[].id
            ')

            if (( ${#stale_ids[@]} == 0 )); then
              echo "Nothing to delete for $pkg"
              continue
            fi

            for id in "${stale_ids[@]}"; do
              echo "Deleting $pkg version id=$id"
              if ! delete_version "$scope" "$pkg" "$id" 2>/tmp/ghcr_cleanup_err.log; then
                err_msg="$(cat /tmp/ghcr_cleanup_err.log)"
                echo "Failed to delete $pkg version id=$id"
                echo "$err_msg"
                echo "Cleanup needs admin/delete permission on package '$pkg'."
                echo "Set package Actions access to Admin for this repo, or set GHCR_CLEANUP_TOKEN (classic PAT with delete:packages)."
                exit 1
              fi
            done
          done