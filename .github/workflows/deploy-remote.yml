name: Deploy to Remote Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve deployment URL and base path
        shell: bash
        env:
          SITE_PUBLIC_URL_OVERRIDE: ${{ vars.SITE_PUBLIC_URL }}
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          resolved_url=""
          resolved_base=""

          if [[ -n "${SITE_PUBLIC_URL_OVERRIDE:-}" ]]; then
            resolved_url="${SITE_PUBLIC_URL_OVERRIDE}"
            resolved_base="/"
          elif [[ -f CNAME ]]; then
            resolved_url="$(head -n 1 CNAME | tr -d '[:space:]')"
            resolved_base="/"
          else
            resolved_url="${repo_owner_lc}.github.io/${repo_name}"
            resolved_base="/${repo_name}/"
          fi

          echo "SITE_PUBLIC_URL=$resolved_url" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=$resolved_base" >> "$GITHUB_ENV"

          echo "Resolved SITE_PUBLIC_URL=$resolved_url"
          echo "Resolved VITE_BASE_PATH=$resolved_base"

      - name: Generate runtime config
        run: node scripts/generate-runtime-config.js

      - name: Build
        run: npm run build

      - name: Copy CNAME into build output
        if: hashFiles('CNAME') != ''
        run: cp CNAME dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production-online
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to server
        id: deployment
        uses: actions/deploy-pages@v4
