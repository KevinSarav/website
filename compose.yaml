services:
  website:
    image: ${WEBSITE_IMAGE}
    build:
      context: .
      args:
        VITE_MY_NAME: ${VITE_MY_NAME}
        VITE_ROLE: ${VITE_ROLE}
        VITE_SUMMARY: ${VITE_SUMMARY}
        VITE_LOCATION: ${VITE_LOCATION}
        VITE_AVAILABILITY: ${VITE_AVAILABILITY}
        VITE_PUBLIC_URL: ${VITE_PUBLIC_URL}
        VITE_RESUME_EMBED_URL: ${VITE_RESUME_EMBED_URL}
        VITE_RESUME_DOWNLOAD_URL: ${VITE_RESUME_DOWNLOAD_URL}
    container_name: website
    ports:
      - "127.0.0.1:5180:80"
    depends_on:
      - docx-converter
    restart: unless-stopped

  docx-converter:
    image: ${DOCX_CONVERTER_IMAGE}
    build:
      context: .
      dockerfile: converter/Dockerfile
    container_name: docx-converter
    environment:
      RESUME_SOURCE_URL: ${VITE_RESUME_DOWNLOAD_URL}
      RESUME_EMBED_URL: ${VITE_RESUME_EMBED_URL}
      GOTENBERG_URL: http://gotenberg:3000
      PDF_FILENAME: ${PDF_FILENAME}
      DOCX_FETCH_TIMEOUT_MS: 20000
      CONVERT_TIMEOUT_MS: 25000
      MAX_DOCX_BYTES: 10485760
    depends_on:
      - gotenberg
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8.23
    container_name: website-gotenberg
    command:
      - gotenberg
      - --api-disable-health-check-logging=true
    restart: unless-stopped