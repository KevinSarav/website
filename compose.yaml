services:
  website:
    image: ${WEBSITE_IMAGE:-website:local}
    build:
      context: .
    environment:
      SITE_APP_NAME: ${SITE_APP_NAME}
      SITE_MY_NAME: ${SITE_MY_NAME}
      SITE_ROLE: ${SITE_ROLE}
      SITE_LOCATION: ${SITE_LOCATION}
      SITE_AVAILABILITY: ${SITE_AVAILABILITY}
      SITE_PUBLIC_URL: ${SITE_PUBLIC_URL}
      SITE_GDOC_RESUME_ID: ${SITE_GDOC_RESUME_ID}
      RESUME_PDF_FILE_NAME: ${RESUME_PDF_FILE_NAME}
    container_name: website
    ports:
      - "127.0.0.1:5180:80"
    restart: unless-stopped