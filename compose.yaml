services:
  website:
    image: ${WEBSITE_IMAGE}
    build:
      context: .
    environment:
      SITE_APP_NAME: ${SITE_APP_NAME}
      SITE_MY_NAME: ${SITE_MY_NAME}
      SITE_ROLE: ${SITE_ROLE}
      SITE_SUMMARY: ${SITE_SUMMARY}
      SITE_LOCATION: ${SITE_LOCATION}
      SITE_AVAILABILITY: ${SITE_AVAILABILITY}
      SITE_PUBLIC_URL: ${SITE_PUBLIC_URL}
      SITE_RESUME_EMBED_URL: ${SITE_RESUME_EMBED_URL}
      SITE_RESUME_DOWNLOAD_URL: ${SITE_RESUME_DOWNLOAD_URL}
      SITE_NOTE_1: ${SITE_NOTE_1}
      SITE_NOTE_2: ${SITE_NOTE_2}
    container_name: website
    ports:
      - "127.0.0.1:5180:80"
    depends_on:
      - docx-converter
    restart: unless-stopped

  docx-converter:
    image: ${DOCX_CONVERTER_IMAGE}
    build:
      context: .
      dockerfile: converter/Dockerfile
    container_name: docx-converter
    environment:
      RESUME_SOURCE_URL: ${SITE_RESUME_DOWNLOAD_URL}
      RESUME_EMBED_URL: ${SITE_RESUME_EMBED_URL}
      GOTENBERG_URL: http://gotenberg:3000
      PDF_FILENAME: ${PDF_FILENAME}
      DOCX_FETCH_TIMEOUT_MS: 20000
      CONVERT_TIMEOUT_MS: 25000
      MAX_DOCX_BYTES: 10485760
    depends_on:
      - gotenberg
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8.23
    container_name: website-gotenberg
    command:
      - gotenberg
      - --api-disable-health-check-logging=true
    restart: unless-stopped